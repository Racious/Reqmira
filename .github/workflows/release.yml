name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release body
        id: release_body
        shell: bash
        run: |
          node scripts/extract-changelog.mjs ${{ github.ref_name }}
          {
            echo 'body<<RELEASE_EOF'
            cat release-body.md
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Reqmira ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Prepare portable exe
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cp "src-tauri/target/release/reqmira.exe" "Reqmira_${VERSION}_portable.exe"

      - name: Upload portable exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Reqmira_*_portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
